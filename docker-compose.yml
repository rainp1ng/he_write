version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./models:/app/models
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/he_write.db
      - CORS_ORIGINS=["http://localhost:3000", "http://127.0.0.1:3000"]
      - DEBUG=true
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    command: npm run dev
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  models:
  data:
